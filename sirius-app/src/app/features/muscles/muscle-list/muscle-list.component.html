<div class="container mx-auto pb-12">
  <div class="mt-8 mb-6 text-center md:text-left">
    <h1 class="text-3xl font-bold">{{ 'MUSCLE.TITLE' | translate }}</h1>
  </div>

  <app-search-input
    [placeholder]="'MUSCLE.ACTIONS.SEARCH' | translate"
    [value]="searchQuery()"
    (valueChange)="onSearchChange($event)">
  </app-search-input>

  <app-list-state
    [isLoading]="isLoading()"
    [isRawEmpty]="rawMuscles().length === 0"
    [isFilteredEmpty]="filteredMuscles().length === 0"
    [emptyMessage]="'MUSCLE.MESSAGES.EMPTY_LIST' | translate"
    [emptySearchMessage]="'MUSCLE.MESSAGES.EMPTY_LIST_SEARCH' | translate: {name: searchQuery()}">

    <app-list-grid [items]="populatedGroups()">

      <ng-template let-group>
        <div class="collapse collapse-arrow bg-base-100 border border-neutral">

          <input type="checkbox"
                 [checked]="expandedGroups().has(group)"
                 (change)="onGroupToggle(group, $event)"/>

          <div class="collapse-title text-xl font-medium flex items-center gap-3">
            {{ 'MUSCLE.GROUPS.' + group | translate }}
            <div class="badge badge-soft badge-accent">{{ groupedMuscles().get(group)?.length }}</div>
          </div>

          <div class="collapse-content p-0">
            <ul class="divide-y divide-base-200">
              @for (muscle of groupedMuscles().get(group); track muscle.id) {
                <app-list-item
                  [title]="getLocalizedName(muscle) || muscle.medicalName"
                  [subtitle]="getLocalizedName(muscle) !== muscle.medicalName ? muscle.medicalName : undefined"
                  [imageUrl]="muscle.imageUrl"
                  [link]="['/muscles', muscle.id]">
                </app-list-item>
              }
            </ul>
          </div>

        </div>
      </ng-template>

    </app-list-grid>
  </app-list-state>

  @if (isAdmin()) {
    <div class="pt-8 flex flex-col md:flex-row justify-end gap-4">
      <button class="btn btn-outline btn-secondary min-w-36"
              (click)="exportCsv()"
              [disabled]="isExporting()">
        <ng-icon name="heroDocumentArrowDown"></ng-icon>
        {{ isExporting() ? '...' : ('EXPORT.EXPORT_CSV' | translate) }}
      </button>

      <a routerLink="/muscles/new" class="btn btn-secondary min-w-36">
        <ng-icon name="heroPlus"></ng-icon>
        {{ 'MUSCLE.ACTIONS.ADD' | translate }}
      </a>
    </div>
  }
</div>
