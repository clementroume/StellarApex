<div class="container mx-auto px-4 py-8 max-w-5xl">

  <app-detail-state [isLoading]="isLoading()">

    <div skeleton class="animate-pulse">
      <div class="flex items-center gap-4 mb-8">
        <div class="w-12 h-12 rounded-full bg-base-300 shrink-0"></div>
        <div class="h-10 bg-base-300 rounded w-1/3"></div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-6">
        <div class="w-full aspect-video bg-base-300 rounded-box"></div>
        <div class="bg-base-200 rounded-box h-72 md:h-auto w-full"></div>
      </div>
      <div class="flex justify-end gap-4">
        <div class="w-36 h-12 bg-base-300 rounded-lg"></div>
        <div class="w-36 h-12 bg-base-300 rounded-lg"></div>
      </div>
    </div>

    @if (muscle(); as m) {

      <app-detail-header
        [title]="getLocalizedName(m)"
        [badgeText]="'MUSCLE.GROUPS.' + m.muscleGroup | translate"
        (back)="goBack()">
      </app-detail-header>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-start mb-8">

        <div
          class="w-full aspect-video bg-base-100 rounded-box flex flex-col items-center justify-center overflow-hidden relative border"
          [class.border-neutral]="!!m.imageUrl"
          [class.border-secondary]="!m.imageUrl">
          @if (m.imageUrl) {
            <img [ngSrc]="m.imageUrl" [alt]="getLocalizedName(m)" fill class="object-cover rounded-box"/>
          } @else {
            <ng-icon name="heroEye" class="text-4xl text-secondary/50 mb-2"></ng-icon>
            <span class="text-secondary font-bold">{{ 'GLOBAL.NO_IMAGE' | translate }}</span>
          }
        </div>

        <app-detail-card paddingClass="p-6 md:p-8" gapClass="gap-8 justify-center">
          <div class="stats shadow-sm border border-base-200 bg-base-200/50">
            <div class="stat place-items-center">
              <div
                class="stat-title text-sm font-semibold uppercase tracking-wider">{{ 'MUSCLE.FIELDS.MEDICAL_NAME' | translate }}
              </div>
              <div class="stat-value text-2xl md:text-3xl text-primary mt-2">{{ m.medicalName }}</div>
            </div>
          </div>

          <div>
            <h3
              class="font-semibold text-lg pb-2 mb-2 border-b border-base-200">{{ 'GLOBAL.DESCRIPTION' | translate }}</h3>
            <p [class.italic]="!getLocalizedDescription(m)" [class.opacity-80]="!getLocalizedDescription(m)"
               class="leading-relaxed text-base">
              {{ getLocalizedDescription(m) || ('GLOBAL.NO_DESCRIPTION' | translate) }}
            </p>
          </div>
        </app-detail-card>

      </div>

      @if (isAdmin()) {
        <app-detail-admin-actions
          [editLink]="['/muscles/edit', m.id]"
          (delete)="onDelete(m)">
        </app-detail-admin-actions>
      }

    }
  </app-detail-state>

</div>
